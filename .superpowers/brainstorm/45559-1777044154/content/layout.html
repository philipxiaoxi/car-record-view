<h2>视频播放页面布局偏好</h2>
<p class="subtitle">移动端上下布局已确定，PC端布局请选择</p>

<div class="cards">
  <div class="card" data-choice="left-right" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup">
        <div class="mockup-header">PC端 - 左右布局</div>
        <div class="mockup-body" style="display: flex; gap: 8px; height: 200px;">
          <div style="flex: 1; background: #1a1a2e; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #666;">
            <div style="text-align: center;">
              <div style="font-size: 24px;">📷</div>
              <div style="margin-top: 8px;">前视视频</div>
            </div>
          </div>
          <div style="flex: 1; background: #1a1a2e; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #666;">
            <div style="text-align: center;">
              <div style="font-size: 24px;">📷</div>
              <div style="margin-top: 8px;">后视视频</div>
            </div>
          </div>
        </div>
        <div style="margin-top: 8px; padding: 8px; background: #16213e; border-radius: 4px; display: flex; justify-content: center; gap: 16px;">
          <span>▶️ 播放</span>
          <span>⏩ 1x</span>
          <span>⬅️ ➡️ 切换</span>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>左右布局</h3>
      <p>充分利用宽屏，两个视频并排显示，适合对比观看</p>
    </div>
  </div>

  <div class="card" data-choice="pip" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup">
        <div class="mockup-header">PC端 - 画中画布局</div>
        <div class="mockup-body" style="position: relative; height: 200px;">
          <div style="width: 100%; height: 100%; background: #1a1a2e; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #666;">
            <div style="text-align: center;">
              <div style="font-size: 32px;">📷</div>
              <div style="margin-top: 8px;">主视频（前视）</div>
            </div>
          </div>
          <div style="position: absolute; right: 16px; bottom: 16px; width: 180px; height: 100px; background: #16213e; border-radius: 4px; border: 2px solid #0f3460; display: flex; align-items: center; justify-content: center; color: #666;">
            <div style="text-align: center; font-size: 12px;">
              <div>📷</div>
              <div>后视</div>
            </div>
          </div>
        </div>
        <div style="margin-top: 8px; padding: 8px; background: #16213e; border-radius: 4px; display: flex; justify-content: center; gap: 16px;">
          <span>▶️ 播放</span>
          <span>⏩ 1x</span>
          <span>⬅️ ➡️ 切换</span>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>画中画布局</h3>
      <p>主视频更大，副视频悬浮角落，可切换主副位置</p>
    </div>
  </div>
</div>
